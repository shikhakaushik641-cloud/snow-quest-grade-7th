<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OMNI-GRID: Class 7 Next Gen Index</title>
    <style>
        :root {
            --bg-deep: #050a14;
            --sidebar-glass: rgba(255, 255, 255, 0.03);
            --neon-yellow: #f4ff00;
            --text-blue: #0a1931; /* Bold Dark Blue for Tabs */
        }

        body {
            margin: 0;
            background-color: var(--bg-deep);
            background-image: radial-gradient(circle at 50% 50%, #101a2d 0%, #050a14 100%);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            height: 100vh;
            color: #e0e6ed;
            overflow: hidden;
        }

        /* SIDEBAR */
        #sidebar {
            width: 300px;
            background: var(--sidebar-glass);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            padding: 40px 20px;
            gap: 20px;
            z-index: 10;
        }

        /* SUBJECT TABS */
        .subject-tab {
            position: relative;
            background: #ffffff;
            color: var(--text-blue);
            padding: 18px 25px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 15px;
            cursor: pointer;
            text-align: left;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid transparent;
            overflow: hidden;
        }

        /* YELLOW STREAK ILLUMINATION EFFECT */
        .subject-tab::before {
            content: "";
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, var(--neon-yellow), transparent);
            transition: 0.5s;
        }

        .subject-tab:hover {
            transform: translateX(10px) scale(1.02);
            box-shadow: 0 0 25px rgba(244, 255, 0, 0.4);
            border-color: var(--neon-yellow);
        }

        .subject-tab:hover::before {
            left: 100%;
        }

        /* MAIN STAGE */
        #main-stage {
            flex-grow: 1;
            padding: 60px;
            overflow-y: auto;
        }

        #subject-header {
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 40px;
            background: linear-gradient(to right, #fff, #5a78af);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        /* CHAPTER GRID */
        #index-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease-out;
        }

        .chapter-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px;
            border-radius: 16px;
            position: relative;
            transition: 0.3s;
        }

        .chapter-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--neon-yellow);
        }

        .chapter-no {
            font-size: 0.8rem;
            color: var(--neon-yellow);
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
        }

        .chapter-name {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .tag-status {
            position: absolute;
            top: 15px; right: 15px;
            font-size: 10px;
            padding: 4px 8px;
            background: rgba(0, 212, 255, 0.2);
            color: #00d4ff;
            border-radius: 4px;
            border: 1px solid #00d4ff;
        }
    </style>
</head>
<body>

<nav id="sidebar">
    <div class="subject-tab" onmouseover="loadChapters('SCIENCE')">Science (Curiosity)</div>
    <div class="subject-tab" onmouseover="loadChapters('MATHS')">Mathematics</div>
    <div class="subject-tab" onmouseover="loadChapters('SST')">Exploring Society</div>
    <div class="subject-tab" onmouseover="loadChapters('ENGLISH')">English (Poorvi)</div>
</nav>

<main id="main-stage">
    <h1 id="subject-header">Intelligence Hub</h1>
    <div id="index-grid"></div>
</main>

<script>
    const ncertData = {
        "SCIENCE": [
            { id: "01", name: "The Ever-Evolving World of Science", tag: "OPEN" },
            { id: "02", name: "Exploring Substances: Acid/Base", tag: "OPEN" },
            { id: "03", name: "Electricity and Circuits", tag: "LOCKED" },
            { id: "04", name: "Metals & Non-metals", tag: "LOCKED" }
        ],
        "MATHS": [
            { id: "01", name: "Integers", tag: "COMPLETED" },
            { id: "02", name: "Fractions and Decimals", tag: "OPEN" },
            { id: "03", name: "Data Handling", tag: "LOCKED" }
        ],
        "SST": [
            { id: "01", name: "Geographical Diversity", tag: "OPEN" },
            { id: "02", name: "The Constitution: Introduction", tag: "OPEN" },
            { id: "03", name: "Climate of India", tag: "LOCKED" }
        ],
        "ENGLISH": [
            { id: "01", name: "Learning Together", tag: "OPEN" },
            { id: "02", name: "Wit and Humour", tag: "OPEN" }
        ]
    };

    function loadChapters(subjectKey) {
        const grid = document.getElementById('index-grid');
        const header = document.getElementById('subject-header');
        
        // Reset state
        grid.style.opacity = "0";
        grid.style.transform = "translateY(20px)";
        header.innerText = subjectKey;

        setTimeout(() => {
            grid.innerHTML = "";
            ncertData[subjectKey].forEach(ch => {
                const card = document.createElement('div');
                card.className = 'chapter-card';
                card.innerHTML = `
                    <span class="tag-status">${ch.tag}</span>
                    <span class="chapter-no">CHAPTER ${ch.id}</span>
                    <div class="chapter-name">${ch.name}</div>
                `;
                grid.appendChild(card);
            });
            grid.style.opacity = "1";
            grid.style.transform = "translateY(0)";
        }, 200);
    }
</script>

</body>
</html>
