<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNI-GRID | Expedition Hub Class 7</title>
    <style>
        :root {
            --bg-space: #020b18;
            --neon-blue: #00d4ff;
            --neon-yellow: #fbff00;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(0, 212, 255, 0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #050f21 url('https://www.transparenttextures.com/patterns/stardust.png');
            color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        #sidebar {
            width: 320px;
            background: rgba(10, 25, 49, 0.8);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--card-border);
            padding: 40px 20px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .subject-tab {
            background: white;
            color: #050f21;
            padding: 15px 20px;
            border-radius: 8px;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s;
            border: 2px solid transparent;
        }

        .subject-tab.active {
            background: var(--neon-blue);
            color: white;
            box-shadow: 0 0 15px var(--neon-blue);
            transform: scale(1.05);
        }

        /* --- MAIN AREA --- */
        #main-stage {
            flex-grow: 1;
            padding: 50px;
            position: relative;
        }

        #subject-title {
            font-size: 3rem;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 20px var(--neon-blue);
        }

        #index-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .chapter-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 15px;
            position: relative;
            transition: 0.4s;
            animation: slideIn 0.5s ease forwards;
        }

        .chapter-card:hover {
            border-color: var(--neon-blue);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
            transform: translateY(-10px);
        }

        .sector-tag {
            color: var(--neon-blue);
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 10px;
            display: block;
        }

        /* --- SNOW & PENGUINS --- */
        .snow-landscape {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%;
            height: 140px;
            background: linear-gradient(to top, #ffffff22 0%, transparent 100%);
            border-top: 2px solid rgba(255,255,255,0.1);
            pointer-events: none;
        }

        .ice-surface {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
        }

        .penguin-squad {
            position: absolute;
            bottom: 25px;
            width: 80px;
            height: 80px;
            animation: march 20s linear infinite;
        }

        .penguin-img {
            width: 60px;
            height: 60px;
            background: url('https://img.icons8.com/color/96/penguin.png') no-repeat center;
            background-size: contain;
            position: absolute;
            bottom: 0;
        }

        /* NEON HELMET */
        .helmet {
            position: absolute;
            top: -5px;
            left: 2px;
            width: 55px;
            height: 45px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(0, 212, 255, 0.6);
            border-radius: 50% 50% 30% 30%;
            box-shadow: 0 0 10px var(--neon-blue);
        }

        .visor {
            position: absolute;
            top: 12px;
            left: 10%;
            width: 80%;
            height: 12px;
            background: var(--neon-blue);
            border-radius: 3px;
            opacity: 0.8;
            box-shadow: 0 0 15px var(--neon-blue);
        }

        @keyframes march {
            from { right: -100px; }
            to { right: 110%; }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

<nav id="sidebar">
    <div class="subject-tab active" onclick="loadContent('SCIENCE', this)">Science (Curiosity)</div>
    <div class="subject-tab" onclick="loadContent('MATHS', this)">Mathematics</div>
    <div class="subject-tab" onclick="loadContent('SST', this)">Society</div>
</nav>

<main id="main-stage">
    <h1 id="subject-title">SCIENCE MISSIONS</h1>
    <div id="index-grid">
        </div>

    <div class="snow-landscape">
        <div class="penguin-squad" style="animation-duration: 15s;">
            <div class="helmet"><div class="visor"></div></div>
            <div class="penguin-img"></div>
        </div>
        <div class="penguin-squad" style="animation-duration: 25s; animation-delay: 4s; bottom: 40px;">
            <div class="helmet" style="border-color: var(--neon-yellow);"><div class="visor" style="background: var(--neon-yellow); box-shadow: 0 0 15px var(--neon-yellow);"></div></div>
            <div class="penguin-img"></div>
        </div>
        <div class="ice-surface"></div>
    </div>
</main>

<script>
    const data = {
        "SCIENCE": [
            {id: "01", name: "The Ever-Evolving World"},
            {id: "02", name: "Acid, Bases and Salts"},
            {id: "03", name: "Electricity & Circuits"},
            {id: "04", name: "Metals & Non-metals"}
        ],
        "MATHS": [
            {id: "01", name: "Integers"},
            {id: "02", name: "Fractions & Decimals"}
        ]
    };

    function loadContent(subject, btn) {
        // Handle Active State
        document.querySelectorAll('.subject-tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        
        // Update Grid
        const grid = document.getElementById('index-grid');
        const title = document.getElementById('subject-title');
        title.innerText = subject + " MISSIONS";
        grid.innerHTML = "";

        if(data[subject]) {
            data[subject].forEach((item, i) => {
                const card = document.createElement('div');
                card.className = 'chapter-card';
                card.style.animationDelay = (i * 0.1) + "s";
                card.innerHTML = `
                    <span class="sector-tag">SECTOR ${item.id}</span>
                    <h3>${item.name}</h3>
                `;
                grid.appendChild(card);
            });
        }
    }

    // Initial Load
    window.onload = () => loadContent('SCIENCE', document.querySelector('.subject-tab'));
</script>

</body>
</html>
