<style>
/* ═══════════════════ RESET ═══════════════════ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#020c1a;}
#app{width:100vw;height:100vh;position:relative;overflow:hidden;font-family:'Rajdhani',sans-serif;}

/* ═══════════════════ SCENE CANVASES ═══════════════════ */
canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
#cBg     {z-index:0;}
#cAurora {z-index:1;}
#cStars  {z-index:2;}
#cSnow   {z-index:3;}
#cTrail  {z-index:20;pointer-events:all;}

/* ═══════════════════ LAYOUT SHELL ═══════════════════ */
#shell {
  position:absolute;top:0;left:0;
  width:100%;height:calc(100% - 115px);
  z-index:8;display:flex;
  pointer-events:all;
}

/* ═══════════════════ LEFT SIDEBAR ═══════════════════ */
.sidebar {
  width:270px;flex-shrink:0;
  background:rgba(1,10,28,.85);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-right:1px solid rgba(0,180,255,.12);
  display:flex;flex-direction:column;
  overflow:hidden;
}

/* Brand strip */
.brand-strip {
  padding:16px 18px 12px;
  border-bottom:1px solid rgba(0,160,255,.1);
  flex-shrink:0;
}
.brand-back {
  display:flex;align-items:center;gap:8px;
  text-decoration:none;color:rgba(0,200,255,.7);
  font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;
  border:1px solid rgba(0,200,255,.22);padding:6px 12px;border-radius:4px;
  background:rgba(0,20,50,.5);transition:all .22s;width:fit-content;
}
.brand-back:hover{color:#00e5ff;border-color:rgba(0,220,255,.5);background:rgba(0,35,75,.6);}
.brand-title {
  margin-top:10px;
  font-family:'Orbitron',monospace;font-size:13px;font-weight:900;letter-spacing:3px;
  background:linear-gradient(135deg,#80d8ff,#00e5ff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.brand-sub{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:2px;color:rgba(0,180,255,.4);margin-top:2px;}

/* Subject nav tabs */
.nav-list{flex:1;overflow-y:auto;padding:14px 14px;display:flex;flex-direction:column;gap:6px;}
.nav-list::-webkit-scrollbar{width:3px;}
.nav-list::-webkit-scrollbar-thumb{background:rgba(0,150,255,.25);border-radius:2px;}

.nav-tab {
  display:flex;align-items:center;gap:12px;
  padding:14px 16px;border-radius:10px;cursor:pointer;
  background:#ffffff;
  box-shadow:0 3px 16px rgba(0,0,0,.5),0 1px 4px rgba(0,0,0,.35);
  border:2px solid transparent;
  transition:transform .22s cubic-bezier(.34,1.56,.64,1),
             box-shadow .22s ease,border-color .18s ease;
  position:relative;overflow:hidden;user-select:none;
}
.nav-tab:hover,.nav-tab.active {
  transform:translateX(8px) scale(1.03);
  box-shadow:0 6px 28px rgba(0,0,0,.6),0 0 0 2.5px var(--tc);
}
.nav-tab.active {background:#fff;}
.nav-tab::after{
  content:'';position:absolute;left:0;top:0;bottom:0;width:4px;
  background:var(--tc);border-radius:10px 0 0 10px;
  transform:scaleY(0);transition:transform .28s cubic-bezier(.34,1.56,.64,1);
}
.nav-tab:hover::after,.nav-tab.active::after{transform:scaleY(1);}

.tab-ico {
  width:38px;height:38px;border-radius:9px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:19px;
  background:var(--tb);box-shadow:0 2px 8px rgba(0,0,0,.28);
}
.tab-txt{flex:1;min-width:0;}
.tab-name{font-weight:700;font-size:14px;color:#0d1b8c;letter-spacing:.3px;line-height:1;}
.tab-sub {font-size:10px;color:rgba(13,27,140,.48);letter-spacing:.5px;margin-top:1px;font-family:'Share Tech Mono',monospace;}
.tab-n {
  flex-shrink:0;width:26px;height:26px;border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Share Tech Mono',monospace;font-size:10px;font-weight:700;
  background:var(--tb);color:var(--tc);
}

/* ═══════════════════ RIGHT CONTENT ═══════════════════ */
.content {
  flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;
  background:rgba(2,10,28,.6);backdrop-filter:blur(6px);
  position:relative;
}

/* Mission header */
.mission-header{
  padding:20px 28px 16px;flex-shrink:0;
  border-bottom:1px solid rgba(0,160,220,.12);
  background:rgba(1,8,24,.45);
}
.mission-eyebrow{
  font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:3px;
  color:rgba(0,180,255,.5);margin-bottom:6px;
}
.mission-title{
  font-family:'Orbitron',monospace;font-size:clamp(20px,3vw,34px);
  font-weight:900;color:#fff;letter-spacing:2px;line-height:1;
  filter:drop-shadow(0 0 22px rgba(0,200,255,.28));
}
.mission-desc{
  font-size:12px;color:rgba(120,185,215,.55);letter-spacing:1px;margin-top:5px;
}
.mission-meta{display:flex;align-items:center;gap:14px;margin-top:10px;}
.meta-pill{
  font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:1.5px;
  padding:4px 10px;border-radius:3px;
  background:rgba(0,200,255,.08);border:1px solid rgba(0,200,255,.25);color:rgba(0,200,255,.75);
}
.prog-wrap{display:flex;align-items:center;gap:8px;margin-left:auto;}
.prog-bar-bg{width:120px;height:4px;background:rgba(0,80,130,.3);border-radius:2px;overflow:hidden;}
.prog-bar-fill{height:100%;border-radius:2px;transition:width .6s ease;}
.prog-label{font-family:'Share Tech Mono',monospace;font-size:9px;color:rgba(0,180,255,.6);}

/* Sector grid scroll */
.sector-scroll{flex:1;overflow-y:auto;padding:22px 24px 16px;}
.sector-scroll::-webkit-scrollbar{width:4px;}
.sector-scroll::-webkit-scrollbar-thumb{background:rgba(0,150,255,.28);border-radius:2px;}

/* Sector grid */
.sector-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:14px;
}

/* Sector card — matching screenshot dark teal */
.sector-card{
  background:rgba(4,18,45,.92);
  border:1px solid rgba(0,150,200,.22);
  border-radius:14px;padding:20px 22px 18px;
  cursor:pointer;transition:all .24s ease;
  position:relative;overflow:hidden;
  min-height:110px;
}
.sector-card::before{
  content:'';position:absolute;inset:0;border-radius:14px;
  background:linear-gradient(135deg,rgba(0,180,255,.04) 0%,transparent 60%);
  pointer-events:none;
}
.sector-card:hover{
  border-color:var(--sc);
  background:rgba(4,22,56,.98);
  transform:translateY(-4px);
  box-shadow:0 12px 40px rgba(0,0,0,.5),0 0 0 1px var(--sc)44;
}
.sector-card:hover .sc-glow{opacity:1;}
.sc-glow{
  position:absolute;top:-30px;right:-30px;
  width:100px;height:100px;border-radius:50%;
  background:radial-gradient(circle,var(--sc)44 0%,transparent 70%);
  opacity:0;transition:opacity .3s;pointer-events:none;
}
.sc-eye{
  font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;
  color:var(--sc);margin-bottom:8px;font-weight:700;
}
.sc-title{
  font-family:'Rajdhani',sans-serif;font-weight:700;
  font-size:clamp(14px,1.6vw,18px);color:#fff;line-height:1.3;
}
.sc-sub{font-size:11px;color:rgba(120,180,215,.5);margin-top:5px;line-height:1.4;}
.sc-badge-row{display:flex;align-items:center;gap:7px;margin-top:12px;}
.sc-badge{
  font-family:'Share Tech Mono',monospace;font-size:7.5px;letter-spacing:1px;
  padding:3px 8px;border-radius:3px;
}
.sc-badge.done{background:rgba(0,200,120,.12);border:1px solid rgba(0,200,120,.35);color:#00e87a;}
.sc-badge.lock{background:rgba(60,80,120,.18);border:1px solid rgba(60,80,120,.3);color:rgba(120,150,200,.45);}

/* Content pane transitions */
.cpane{
  display:none;flex-direction:column;
  width:100%;height:100%;
  min-height:0;overflow:hidden;
}
.cpane.active{
  display:flex;
  animation:paneIn .28s cubic-bezier(.25,.46,.45,.94) both;
}
@keyframes paneIn{
  from{opacity:0;transform:translateX(16px);}
  to{opacity:1;transform:translateX(0);}
}

/* ═══════════════════ BOTTOM STRIP ═══════════════════ */
.strip-label{
  position:absolute;bottom:5px;right:22px;z-index:7;
  font-family:'Share Tech Mono',monospace;font-size:7px;
  letter-spacing:2px;color:rgba(0,180,255,.22);pointer-events:none;
}
</style>

/* ═══════════════════════════════════════════════
   BUILD PANE HTML
═══════════════════════════════════════════════ */
function buildPane(key){
  const d=SUBS[key], done=d.chapters.filter(c=>c.done).length;
  const pane=document.createElement('div');
  pane.className='cpane';pane.id='pane-'+key;

  pane.innerHTML=`
    <div class="mission-header">
      <div class="mission-eyebrow">OMNI-GRID CRYO-STATION ALPHA · CLASS 7</div>
      <div class="mission-title" style="color:#fff;filter:drop-shadow(0 0 20px ${d.color}66);">${d.label}</div>
      <div class="mission-desc">${d.desc}</div>
      <div class="mission-meta">
        ${d.meta.map(m=>`<div class="meta-pill">${m}</div>`).join('')}
        <div class="prog-wrap">
          <div class="prog-bar-bg"><div class="prog-bar-fill" style="width:${d.progress}%;background:linear-gradient(90deg,${d.color}88,${d.color});"></div></div>
          <div class="prog-label">${done}/${d.chapters.length} · ${d.progress}%</div>
        </div>
      </div>
    </div>
    <div class="sector-scroll"><div class="sector-grid" id="grid-${key}"></div></div>`;

  const grid=pane.querySelector('#grid-'+key);
  d.chapters.forEach((ch,i)=>{
    const card=document.createElement('div');
    card.className='sector-card';
    card.style.cssText=`--sc:${d.color};`;
    card.innerHTML=`
      <div class="sc-glow"></div>
      <div class="sc-eye">SECTOR ${String(i+1).padStart(2,'0')}</div>
      <div class="sc-title">${ch.t}</div>
      <div class="sc-sub">${ch.s}</div>
      <div class="sc-badge-row">
        <div class="sc-badge ${ch.done?'done':'lock'}">${ch.done?'&#10003; TESTING ZONE':'LOCKED'}</div>
        ${ch.done?`<div class="sc-badge done" style="background:rgba(0,180,255,.1);border-color:rgba(0,180,255,.3);color:#00c8ff;">COMPLETED</div>`:''}
      </div>`;
    card.addEventListener('click',()=>{
      card.style.boxShadow=`0 0 32px ${d.color}55`;
      setTimeout(()=>card.style.boxShadow='',800);
    });
    grid.appendChild(card);
  });
  return pane;
}

/* ═══════════════════════════════════════════════
   RENDER + SWITCH LOGIC
═══════════════════════════════════════════════ */
const contentArea=document.getElementById('contentArea');
let current=null, switchT=null;

// Build all panes up front
Object.keys(SUBS).forEach(k=>{
  const p=buildPane(k);
  contentArea.appendChild(p);
});

function activate(key){
  if(key===current) return;
  current=key;
  // Update tabs
  document.querySelectorAll('.nav-tab').forEach(t=>{
    t.classList.toggle('active',t.dataset.s===key);
  });
  // Update panes — remove active from all, add to target
  document.querySelectorAll('.cpane').forEach(p=>{
    p.classList.remove('active');
  });
  const pane=document.getElementById('pane-'+key);
  if(pane){
    // Force reflow so animation re-triggers on each switch
    void pane.offsetWidth;
    pane.classList.add('active');
  }
}

// Activate Science on load
activate('science');

// Hover (with debounce) + click
document.querySelectorAll('.nav-tab').forEach(tab=>{
  tab.addEventListener('mouseenter',()=>{
    clearTimeout(switchT);
    switchT=setTimeout(()=>activate(tab.dataset.s),60);
  });
  tab.addEventListener('mouseleave',()=>clearTimeout(switchT));
  tab.addEventListener('click',()=>{
    clearTimeout(switchT);
    activate(tab.dataset.s);
  });
});

  for(let i=0;i<240;i++){

    }
  }
  // Twinkle animation
  const stars=[];
  for(let i=0;i<60;i++) stars.push({x:Math.random()*W,y:Math.random()*H*.55,r:Math.random()*1.4+.4,phase:Math.random()*Math.PI*2,speed:Math.random()*.04+.02});

  {yo:.19,amp:22,fr:.009,sp:.014,col:'rgba(0,170,220,',  a:.18},

  aCtx.clearRect(0,0,aCanv.width,aCanv.height);
  const W=aCanv.width,H=aCanv.height;
  AURORA_BANDS.forEach(b=>{
    aCtx.beginPath();

      const y=H*b.yo+Math.sin(x*b.fr+at*b.sp)*b.amp+Math.sin(x*b.fr*.55+at*b.sp*1.5)*b.amp*.45;
      x===0?aCtx.moveTo(x,y):aCtx.lineTo(x,y);
    }
    aCtx.lineTo(W,0);aCtx.lineTo(0,0);aCtx.closePath();
    aCtx.fillStyle=b.col+b.a+')';aCtx.fill();
  });
  at+=.30;
  requestAnimationFrame(drawAurora);
}

    ctx.fillStyle=bkG;ctx.beginPath();ctx.moveTo(-S*.12,bky-S*.018);ctx.quadraticCurveTo(0,bky-S*.088,S*.12,bky-S*.018);ctx.quadraticCurveTo(S*.036,bky+S*.19,-S*.036,bky+S*.19);ctx.quadraticCurveTo(-S*.12,bky+S*.088,-S*.12,bky-S*.018);ctx.closePath();ctx.fill();
    ctx.restore();ctx.restore();
  }

  // Ground ice
  (function(){
    const iceCanv=document.createElement('canvas');iceCanv.width=W;iceCanv.height=H;
    iceCanv.style.cssText='position:absolute;top:0;left:0;width:100%;height:100%;z-index:4;pointer-events:none;';
    document.getElementById('app').appendChild(iceCanv);
    const ix=iceCanv.getContext('2d');
    const sg=ix.createLinearGradient(0,GROUND_Y-24,0,H);sg.addColorStop(0,'#7ecee8');sg.addColorStop(.2,'#aae2f6');sg.addColorStop(.55,'#d4f2fd');sg.addColorStop(1,'#eef9ff');
    ix.fillStyle=sg;ix.beginPath();ix.moveTo(0,GROUND_Y);
    for(let px=0;px<=W;px+=10)ix.lineTo(px,GROUND_Y+Math.sin(px*.018)*6+Math.cos(px*.007)*4);
    ix.lineTo(W,H);ix.lineTo(0,H);ix.closePath();ix.fill();
    for(let s=0;s<100;s++){const sx=Math.random()*W,sy=GROUND_Y+4+Math.random()*46,sa=Math.random()*.7+.22,sr=Math.random()*2.2+.4;ix.fillStyle=`rgba(255,255,255,${sa})`;ix.beginPath();ix.arc(sx,sy,sr,0,Math.PI*2);ix.fill();}
  })();

  const pSt=[];
  const hitDivs=[];
  for(let i=0;i<3;i++){
    pSt.push({x:W*(.15+i*.30),vx:(Math.random()-.5)*1.0,tx:Math.random()*W*.75+W*.08,spd:.68+Math.random()*.5,dir:1,state:'WALK',stimer:0,slideVx:0,phase:i*2.1,wobT:0,wobAng:0});
    const d=document.createElement('div');
    d.style.cssText='position:absolute;width:80px;height:100px;cursor:pointer;z-index:21;';
    document.getElementById('app').appendChild(d);
    hitDivs.push(d);
    d.addEventListener('mouseenter',()=>trigSlide(i));
    d.addEventListener('click',()=>trigSlide(i));
  }

  function trigSlide(i){const s=pSt[i];if(s.state==='SLIDE')return;s.state='SLIDE';s.stimer=100;s.slideVx=s.dir*9;}
  function spray(x,y,dir){for(let n=0;n<6;n++)particles.push({x,y,vx:-dir*(Math.random()*2.8+.4)+Math.random()*1.1,vy:-Math.random()*2.4-.5,life:1,r:Math.random()*3+.8});}

  const t0=Date.now();
  function frame(){
    trX.clearRect(0,0,W,H);const now=Date.now();
    for(let t=trails.length-1;t>=0;t--){const tr=trails[t],age=(now-tr.time)/2900;if(age>=1){trails.splice(t,1);continue;}const a=.42*(1-age)*(1-age);trX.strokeStyle=`rgba(100,215,255,${a})`;trX.lineWidth=(5.5-age*4.5)+.7;trX.lineCap='round';trX.beginPath();trX.moveTo(tr.x1,tr.y1);trX.lineTo(tr.x2,tr.y2);trX.stroke();trX.strokeStyle=`rgba(0,180,255,${a*.3})`;trX.lineWidth=(10-age*8)+1;trX.beginPath();trX.moveTo(tr.x1,tr.y1);trX.lineTo(tr.x2,tr.y2);trX.stroke();}
    for(let p=particles.length-1;p>=0;p--){const pt=particles[p];pt.life-=.04;if(pt.life<=0){particles.splice(p,1);continue;}pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=.13;const a=pt.life*.9;trX.fillStyle=`rgba(215,248,255,${a})`;trX.beginPath();trX.arc(pt.x,pt.y,pt.r*pt.life,0,Math.PI*2);trX.fill();}
    pSt.forEach((s,i)=>{
      if(s.state==='SLIDE'){
        s.stimer--;if(s.stimer<=0){s.state='WOBBLE';s.wobT=50;s.wobAng=0;}
        const px=s.x;s.slideVx*=.983;s.x+=s.slideVx;s.x=Math.max(44,Math.min(W-44,s.x));
        if(Math.abs(s.slideVx)>.35){trails.push({x1:px,y1:GROUND_Y,x2:s.x,y2:GROUND_Y,time:now});if(Math.random()>.52)spray(s.x+(s.dir>0?-34:34),GROUND_Y-2,s.dir);}
        trX.save();if(s.dir<0){trX.scale(-1,1);trX.translate(-W,0);}
        drawPeng(trX,s.dir>0?s.x:W-s.x,GROUND_Y,s.phase,true,0);trX.restore();
      } else if(s.state==='WOBBLE'){
        s.wobT--;if(s.wobT<=0)s.state='WALK';s.wobAng=Math.sin(s.wobT*.44)*14*(s.wobT/50);
        drawPeng(trX,s.x,GROUND_Y,0,false,s.wobAng);
      } else {
        const dx=s.tx-s.x,dist=Math.abs(dx);if(dist<22){s.tx=Math.random()*W*.82+W*.05;}
        s.vx+=(dx/(dist||1))*.13;s.vx*=.88;const vm=Math.abs(s.vx);if(vm>s.spd)s.vx=s.vx/vm*s.spd;
        const px=s.x;s.x+=s.vx;s.x=Math.max(44,Math.min(W-44,s.x));
        if(vm>.13)trails.push({x1:px,y1:GROUND_Y,x2:s.x,y2:GROUND_Y,time:now});
        s.dir=s.vx>=0?1:-1;s.phase+=.072;
        trX.save();if(s.dir<0){trX.scale(-1,1);trX.translate(-W,0);}
        drawPeng(trX,s.dir>0?s.x:W-s.x,GROUND_Y,s.phase,false,0);trX.restore();
      }
      if(hitDivs[i]){hitDivs[i].style.left=(s.x-40)+'px';hitDivs[i].style.top=(GROUND_Y-95)+'px';}
    });
    requestAnimationFrame(frame);
  }
  frame();
})();

      fill="rgba(255,220,80,.9)" stroke="rgba(255,180,40,.55)" stroke-width="1"/>
    <polygon points="21,8 23.5,15.5 31,15.5 25,20 27.5,28 21,23.5 14.5,28 17,20 11,15.5 18.5,15.5"
      fill="rgba(255,242,140,.65)"/>
    <circle cx="21" cy="21" r="3.5" fill="rgba(255,248,180,.9)"/>`;

  // Ice crystal
  const ic = document.createElementNS(NS,'svg');
  ic.setAttribute('width','36');ic.setAttribute('height','36');ic.setAttribute('viewBox','0 0 36 36');
  ic.style.cssText = 'filter:drop-shadow(0 0 8px rgba(80,200,255,.7));animation:icFloat 5s ease-in-out infinite 2.2s;flex-shrink:0;';
  ic.innerHTML = `

    <polygon points="18,2 22,14 34,18 22,22 18,34 14,22 2,18 14,14"

    <polygon points="18,8 21,15 28,18 21,21 18,28 15,21 8,18 15,15"

    <circle cx="18" cy="18" r="4" fill="rgba(0,230,255,.9)"/>`;

  wrap.appendChild(sf);wrap.appendChild(st);wrap.appendChild(ic);
