<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Snow Quest – Class 7 NCERT</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sidebar-w: 280px;
    --bg-dark: #06111e;
    --bg-sidebar: #08121f;
    --bg-card: #0e1e30;
    --bg-card-hover: #111f2e;
    --accent-cyan: #00d4ff;
    --accent-cyan-dim: #00d4ff22;
    --border-dim: #1a2d42;
    --text-primary: #e8f4ff;
    --text-muted: #4a7a9b;
    --text-dim: #2a4a6a;
  }

  html, body { height: 100%; overflow: hidden; }

  body {
    font-family: 'Rajdhani', sans-serif;
    background: var(--bg-dark);
    display: flex;
    height: 100vh;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    background: var(--bg-sidebar);
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border-dim);
    height: 100vh;
    z-index: 10;
    position: relative;
  }

  .sidebar-top {
    padding: 14px 14px 10px;
    border-bottom: 1px solid var(--border-dim);
    flex-shrink: 0;
  }

  .expedition-btn {
    background: transparent;
    border: 1px solid var(--accent-cyan);
    color: var(--accent-cyan);
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.5px;
    padding: 5px 10px;
    border-radius: 4px;
    cursor: pointer;
    margin-bottom: 12px;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    transition: background 0.2s;
  }
  .expedition-btn:hover { background: #00d4ff15; }
  .expedition-btn::before { content: '+'; font-size: 13px; }

  .logo { font-family: 'Orbitron', monospace; font-size: 19px; font-weight: 900; color: var(--accent-cyan); letter-spacing: 3px; }
  .logo-sub { font-size: 9px; color: var(--text-muted); letter-spacing: 2px; margin-top: 2px; text-transform: uppercase; }

  /* ── SUBJECTS ── */
  .subjects-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 10px 10px;
    display: flex;
    flex-direction: column;
    gap: 7px;
  }
  .subjects-scroll::-webkit-scrollbar { width: 3px; }
  .subjects-scroll::-webkit-scrollbar-track { background: transparent; }
  .subjects-scroll::-webkit-scrollbar-thumb { background: var(--border-dim); border-radius: 2px; }

  .subject-card {
    background: var(--bg-card);
    border: 1.5px solid var(--border-dim);
    border-radius: 14px;
    padding: 12px 13px;
    display: flex;
    align-items: center;
    gap: 11px;
    cursor: pointer;
    transition: all 0.18s ease;
    flex-shrink: 0;
  }
  .subject-card:hover { background: var(--bg-card-hover); border-color: #2a4a6a; }
  .subject-card.active {
    border-color: var(--accent-cyan);
    background: #0a1e30;
    box-shadow: 0 0 0 2px #00d4ff22, inset 0 0 20px #00d4ff08;
  }

  .subj-icon {
    width: 46px; height: 46px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .subj-info { flex: 1; min-width: 0; }
  .subj-name {
    font-family: 'Orbitron', monospace;
    font-size: 12px; font-weight: 700;
    color: var(--text-primary);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .subj-sub { font-size: 10px; color: var(--text-muted); letter-spacing: 1px; margin-top: 2px; text-transform: uppercase; }
  .subj-badge {
    width: 34px; height: 34px;
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Orbitron', monospace;
    font-size: 12px; font-weight: 700;
    flex-shrink: 0;
  }

  /* ── MAIN AREA ── */
  .main {
    flex: 1;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Snow scene background */
  .scene {
    position: absolute; inset: 0;
    background: linear-gradient(180deg,
      #0a2a3d 0%,
      #0d3352 15%,
      #0e3a5e 30%,
      #122d52 50%,
      #101d38 65%,
      #0a1220 80%,
      #060e18 90%
    );
    overflow: hidden;
  }

  /* Snow hills */
  .snow-hill {
    position: absolute;
    bottom: 0;
    width: 100%;
  }
  .snow-hill svg { display: block; width: 100%; }

  /* Moon */
  .moon {
    position: absolute;
    top: 6%; right: 10%;
    width: 52px; height: 52px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #b8f0ff, #5dd4f5 40%, #1aacdd);
    box-shadow: 0 0 30px #5dd4f566, 0 0 60px #5dd4f533;
  }

  /* Stars */
  .stars-layer { position: absolute; inset: 0; pointer-events: none; }

  /* Wave layers */
  .wave { position: absolute; width: 120%; left: -10%; }

  /* Chapter panel overlay */
  .chapter-overlay {
    position: absolute; inset: 0;
    background: rgba(6, 17, 30, 0.92);
    backdrop-filter: blur(4px);
    display: flex;
    flex-direction: column;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
    z-index: 5;
  }
  .chapter-overlay.visible {
    opacity: 1;
    pointer-events: all;
  }

  .chapter-header {
    padding: 20px 28px 14px;
    border-bottom: 1px solid #1a2d42;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .chapter-header-left { display: flex; align-items: center; gap: 14px; }
  .chapter-subject-icon {
    width: 48px; height: 48px; border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  .chapter-subject-name {
    font-family: 'Orbitron', monospace;
    font-size: 18px; font-weight: 900;
    color: var(--text-primary);
  }
  .chapter-subject-sub { font-size: 11px; color: var(--text-muted); letter-spacing: 1.5px; margin-top: 2px; text-transform: uppercase; }
  .chapter-count-badge {
    font-family: 'Orbitron', monospace;
    font-size: 11px; font-weight: 700;
    padding: 4px 12px; border-radius: 20px;
    color: var(--accent-cyan);
    border: 1px solid var(--accent-cyan);
    background: #00d4ff10;
  }

  .close-btn {
    background: var(--bg-card);
    border: 1px solid var(--border-dim);
    color: var(--text-muted);
    font-size: 20px;
    width: 36px; height: 36px;
    border-radius: 8px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    line-height: 1;
  }
  .close-btn:hover { border-color: #ff4a4a; color: #ff4a4a; }

  .chapter-grid {
    flex: 1;
    overflow-y: auto;
    padding: 18px 28px 28px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 10px;
    align-content: start;
  }
  .chapter-grid::-webkit-scrollbar { width: 4px; }
  .chapter-grid::-webkit-scrollbar-track { background: transparent; }
  .chapter-grid::-webkit-scrollbar-thumb { background: var(--border-dim); border-radius: 2px; }

  .chapter-item {
    background: var(--bg-card);
    border: 1px solid var(--border-dim);
    border-radius: 11px;
    padding: 13px 15px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .chapter-item:hover {
    background: var(--bg-card-hover);
    border-color: #2a4a6a;
    transform: translateY(-1px);
  }
  .chapter-item:active { transform: translateY(0); }

  .ch-num {
    font-family: 'Orbitron', monospace;
    font-size: 10px; font-weight: 700;
    color: var(--text-muted);
    min-width: 30px;
    flex-shrink: 0;
  }
  .ch-title {
    font-size: 13px; font-weight: 500;
    color: #b8d0e8;
    flex: 1;
    line-height: 1.3;
  }
  .ch-arrow { font-size: 16px; color: var(--text-dim); flex-shrink: 0; transition: color 0.15s; }
  .chapter-item:hover .ch-arrow { color: var(--accent-cyan); }

  /* Welcome screen (no subject selected) */
  .welcome-screen {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 2; pointer-events: none;
    transition: opacity 0.3s;
  }
  .welcome-screen.hidden { opacity: 0; }

  .welcome-title {
    font-family: 'Orbitron', monospace;
    font-size: 36px; font-weight: 900;
    color: var(--accent-cyan);
    letter-spacing: 6px;
    text-shadow: 0 0 40px #00d4ff55;
    margin-bottom: 8px;
  }
  .welcome-sub {
    font-size: 14px; color: var(--text-muted);
    letter-spacing: 3px; text-transform: uppercase;
  }
  .welcome-hint {
    margin-top: 32px;
    font-size: 12px; color: var(--text-dim);
    letter-spacing: 2px;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

  /* Snow particle animation */
  @keyframes snowfall {
    0% { transform: translateY(-10px) translateX(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 0.6; }
    100% { transform: translateY(100vh) translateX(30px); opacity: 0; }
  }
  .snowflake {
    position: absolute;
    top: -5px;
    width: 3px; height: 3px;
    background: white;
    border-radius: 50%;
    animation: snowfall linear infinite;
    pointer-events: none;
  }

  /* ── VILLAGE LAYER ── */
  .village-layer {
    position: absolute;
    bottom: 38px;
    left: 0; right: 0;
    height: 180px;
    pointer-events: none;
    overflow: hidden;
  }

  /* Houses */
  .house {
    position: absolute;
    bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .house-roof {
    width: 0; height: 0;
    border-left: solid transparent;
    border-right: solid transparent;
    border-bottom: solid #0d2140;
    position: relative;
  }
  .house-roof::after {
    content: '';
    position: absolute;
    top: -8px; left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: solid transparent;
    border-right: solid transparent;
    border-bottom: 10px solid #d8eef8;
  }
  .house-body {
    background: #0d2140;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .house-window {
    background: #f5c842;
    border-radius: 2px;
    box-shadow: 0 0 8px #f5c84288;
  }
  .house-antenna {
    position: absolute;
    top: -100%;
    left: 50%;
    transform: translateX(-50%);
    width: 2px;
    background: #1a3a5c;
  }
  .house-antenna::after {
    content: '';
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent-cyan);
    box-shadow: 0 0 6px var(--accent-cyan);
  }

  /* Pine trees */
  .tree {
    position: absolute;
    bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }
  .tree-tier {
    width: 0; height: 0;
    border-left: solid transparent;
    border-right: solid transparent;
    border-bottom: solid #1a5c30;
    margin-top: -4px;
    position: relative;
  }
  .tree-tier::after {
    content: '';
    position: absolute;
    top: 3px; left: 50%;
    transform: translateX(-50%);
    width: 60%; height: 3px;
    background: #d8eef888;
    border-radius: 1px;
  }
  .tree-trunk {
    width: 5px;
    background: #3a2010;
    border-radius: 1px;
  }

  /* Penguin */
  .penguin {
    position: absolute;
    bottom: 0;
    cursor: pointer;
    pointer-events: all;
  }
  .penguin svg { display: block; }

  /* Waddle walk */
  @keyframes waddle-right {
    0%   { transform: translateX(0)   rotate(0deg);   }
    20%  { transform: translateX(12%) rotate(6deg);  }
    40%  { transform: translateX(24%) rotate(-4deg); }
    60%  { transform: translateX(36%) rotate(5deg);  }
    80%  { transform: translateX(48%) rotate(-3deg); }
    100% { transform: translateX(60%) rotate(0deg);  }
  }
  @keyframes waddle-left {
    0%   { transform: translateX(0)    rotate(0deg)  scaleX(-1); }
    20%  { transform: translateX(-12%) rotate(-6deg) scaleX(-1); }
    40%  { transform: translateX(-24%) rotate(4deg)  scaleX(-1); }
    60%  { transform: translateX(-36%) rotate(-5deg) scaleX(-1); }
    80%  { transform: translateX(-48%) rotate(3deg)  scaleX(-1); }
    100% { transform: translateX(-60%) rotate(0deg)  scaleX(-1); }
  }
  @keyframes bob {
    0%,100% { transform: translateY(0); }
    50%     { transform: translateY(-3px); }
  }
  .penguin-inner { transform-origin: bottom center; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-top">
    <button class="expedition-btn">EXPEDITION HQ</button>
    <div class="logo">SNOW QUEST</div>
    <div class="logo-sub">Class 7 &nbsp;·&nbsp; NCERT 2024 &nbsp;·&nbsp; Omni-Grid</div>
  </div>
  <div class="subjects-scroll" id="subjectList"></div>
</aside>

<!-- MAIN -->
<main class="main">
  <!-- Snow scene -->
  <div class="scene" id="scene">
    <div class="moon"></div>
    <div class="stars-layer" id="stars"></div>

    <!-- Wave layers -->
    <svg class="wave" style="bottom:38%;height:120px;opacity:0.35;" viewBox="0 0 1440 120" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,60 C360,110 1080,10 1440,60 L1440,120 L0,120 Z" fill="#0a4a7a"/>
    </svg>
    <svg class="wave" style="bottom:26%;height:130px;opacity:0.5;" viewBox="0 0 1440 130" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,70 C400,20 1000,100 1440,50 L1440,130 L0,130 Z" fill="#0a2a50"/>
    </svg>
    <svg class="wave" style="bottom:15%;height:130px;opacity:0.6;" viewBox="0 0 1440 130" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,80 C300,30 1100,120 1440,60 L1440,130 L0,130 Z" fill="#071830"/>
    </svg>

    <!-- Village layer: houses, trees, penguins -->
    <div class="village-layer" id="village"></div>

    <!-- Snow ground -->
    <svg style="position:absolute;bottom:0;width:100%;height:120px;" viewBox="0 0 1440 120" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,60 C200,20 400,80 600,40 C800,0 1000,70 1200,35 C1350,10 1420,55 1440,45 L1440,120 L0,120 Z" fill="#c8e8f8"/>
    </svg>
    <svg style="position:absolute;bottom:0;width:100%;height:50px;" viewBox="0 0 1440 50" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,30 C200,10 400,40 600,20 C800,0 1000,35 1200,18 C1350,5 1420,28 1440,20 L1440,50 L0,50 Z" fill="#e8f4ff"/>
    </svg>
  </div>

  <!-- Welcome -->
  <div class="welcome-screen" id="welcome">
    <div class="welcome-title">SNOW QUEST</div>
    <div class="welcome-sub">Class 7 · NCERT 2024</div>
    <div class="welcome-hint">← Select a subject to begin</div>
  </div>

  <!-- Chapter overlay -->
  <div class="chapter-overlay" id="chapterOverlay">
    <div class="chapter-header">
      <div class="chapter-header-left">
        <div class="chapter-subject-icon" id="ovIcon"></div>
        <div>
          <div class="chapter-subject-name" id="ovName"></div>
          <div class="chapter-subject-sub" id="ovSub"></div>
        </div>
        <div class="chapter-count-badge" id="ovCount"></div>
      </div>
      <button class="close-btn" id="closeBtn" title="Close">✕</button>
    </div>
    <div class="chapter-grid" id="chapterGrid"></div>
  </div>
</main>

<script>
const subjects = [
  {
    id: 'science', name: 'Science', sub: 'CURIOSITY', icon: '⚛️',
    iconBg: '#162035', badgeBg: '#0e2a45', badgeColor: '#5bc8f5', count: 18,
    chapters: [
      'Nutrition in Plants','Nutrition in Animals','Fibre to Fabric','Heat',
      'Acids, Bases and Salts','Physical and Chemical Changes',
      'Weather, Climate and Adaptations of Animals to Climate',
      'Wind, Storms and Cyclones','Soil','Respiration in Organisms',
      'Transportation in Animals and Plants','Reproduction in Plants',
      'Motion and Time','Electric Current and its Effects','Light',
      'Water: A Precious Resource','Forests: Our Lifeline','Wastewater Story'
    ]
  },
  {
    id: 'math', name: 'Mathematics', sub: 'GANIT', icon: '√',
    iconBg: '#1e1e10', badgeBg: '#2e2810', badgeColor: '#f5c842', count: 15,
    isText: true, iconColor: '#f5c842',
    chapters: [
      'Integers','Fractions and Decimals','Data Handling',
      'Simple Equations','Lines and Angles','The Triangle and its Properties',
      'Congruence of Triangles','Comparing Quantities','Rational Numbers',
      'Practical Geometry','Perimeter and Area','Algebraic Expressions',
      'Exponents and Powers','Symmetry','Visualising Solid Shapes'
    ]
  },
  {
    id: 'english', name: 'English', sub: 'HONEYCOMB', icon: '✏️',
    iconBg: '#2a1520', badgeBg: '#3a1530', badgeColor: '#f585b0', count: 20,
    chapters: [
      'Three Questions','A Gift of Chappals','Gopal and the Hilsa Fish',
      'The Ashes that Made Trees Bloom','Quality','Expert Detectives',
      'The Invention of Vita Wonk','Fire: Friend and Foe',
      'A Bicycle in Good Repair','The Story of Cricket',
      'The Squirrel (Poem)','The Rebel (Poem)','The Shed (Poem)',
      'Chivvy (Poem)','Trees (Poem)','Meadow Surprises (Poem)',
      'Garden Snake (Poem)','Passage 1','Passage 2','Passage 3'
    ]
  },
  {
    id: 'hindi', name: 'Hindi', sub: 'वसंत भाग 2', icon: '📕',
    iconBg: '#1e1200', badgeBg: '#2a1c00', badgeColor: '#f5a030', count: 20,
    chapters: [
      'हम पंछी उन्मुक्त गगन के','दादी माँ','हिमालय की बेटियाँ',
      'कठपुतली','मिठाईवाला','रक्त और हमारा शरीर',
      'पापा खो गए','शाम – एक किसान','चिड़िया की बच्ची',
      'अपूर्व अनुभव','रहीम के दोहे','कंचा',
      'एक तिनका','खानपान की बदलती तस्वीर','नीलकंठ',
      'भोर और बरखा','वीर कुँवर सिंह','संघर्ष के कारण मैं तुनुकमिजाज हो गया',
      'आश्रम का अनुमानित व्यय','विप्लव-गायन'
    ]
  },
  {
    id: 'sst', name: 'Social Science', sub: 'HISTORY · GEO · CIVICS', icon: '🌍',
    iconBg: '#0d1f1a', badgeBg: '#0d2820', badgeColor: '#2dcea0', count: 28,
    chapters: [
      'Tracing Changes Through a Thousand Years','New Kings and Kingdoms',
      'The Delhi Sultans','The Mughal Empire','Rulers and Buildings',
      'Towns, Traders and Craftspersons','Tribes, Nomads and Settled Communities',
      'Devotional Paths to the Divine','The Making of Regional Cultures',
      'Eighteenth-Century Political Formations','Environment','Inside our Earth',
      'Our Changing Earth','Air','Water','Natural Vegetation and Wildlife',
      'Human Environment – Settlement, Transport and Communication',
      'Human-Environment Interactions: The Tropical and the Subtropical Region',
      'Life in the Temperate Grasslands','Life in the Deserts',
      'On Equality','Role of the Government in Health',
      'How the State Government Works','Growing up as Boys and Girls',
      'Women Change the World','Understanding Media',
      'Markets Around Us','A Shirt in the Market'
    ]
  },
  {
    id: 'sanskrit', name: 'Sanskrit', sub: 'रुचिरा भाग 2', icon: '▶',
    iconBg: '#1a1030', badgeBg: '#251545', badgeColor: '#c0a0f5', count: 15,
    chapters: [
      'सुभाषितानि','दुर्बुद्धिः विनश्यति','स्वावलम्बनम्',
      'हास्यबालकविसम्मेलनम्','पण्डिता रमाबाई','सदाचारः',
      'संकल्पः सिद्धिदायकः','त्रिकोणमितिः','अहमपि विद्यालयं गमिष्यामि',
      'विश्वबन्धुत्वम्','समवायो हि दुर्जयः','विद्याधनम्',
      'अमृतं संस्कृतम्','आर्यभटः','प्रहेलिकाः'
    ]
  }
];

let activeId = null;

// Build subject list
const subjectList = document.getElementById('subjectList');
subjects.forEach(s => {
  const card = document.createElement('div');
  card.className = 'subject-card';
  card.id = 'card-' + s.id;

  const iconStyle = s.isText
    ? `background:${s.iconBg}; color:${s.iconColor}; font-family:monospace; font-size:22px; font-weight:700;`
    : `background:${s.iconBg}; font-size:20px;`;

  card.innerHTML = `
    <div class="subj-icon" style="${iconStyle}">${s.icon}</div>
    <div class="subj-info">
      <div class="subj-name">${s.name}</div>
      <div class="subj-sub">${s.sub}</div>
    </div>
    <div class="subj-badge" style="background:${s.badgeBg}; color:${s.badgeColor};">${s.count}</div>
  `;

  card.addEventListener('click', () => openSubject(s));
  subjectList.appendChild(card);
});

// ── VILLAGE BUILDER ──
function makePenguinSVG(size, hasHat, glowColor) {
  const h = size, w = size * 0.7;
  const hat = hasHat ? `
    <ellipse cx="${w/2}" cy="${h*0.13}" rx="${w*0.28}" ry="${h*0.04}" fill="#1a2a1a"/>
    <rect x="${w*0.3}" y="${h*0.04}" width="${w*0.4}" height="${h*0.1}" rx="2" fill="#1a3a1a"/>
    <circle cx="${w*0.5}" cy="${h*0.04}" r="${h*0.035}" fill="${glowColor||'#f5c842'}" style="filter:drop-shadow(0 0 4px ${glowColor||'#f5c842'})"/>
  ` : '';
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
    ${hat}
    <!-- body -->
    <ellipse cx="${w*0.5}" cy="${h*0.55}" rx="${w*0.38}" ry="${h*0.38}" fill="#1a1a2e"/>
    <!-- belly -->
    <ellipse cx="${w*0.5}" cy="${h*0.6}" rx="${w*0.22}" ry="${h*0.26}" fill="#e8f0ff"/>
    <!-- head -->
    <circle cx="${w*0.5}" cy="${h*0.2}" r="${w*0.28}" fill="#1a1a2e"/>
    <!-- face white -->
    <ellipse cx="${w*0.5}" cy="${h*0.22}" rx="${w*0.18}" ry="${w*0.14}" fill="#e8f0ff"/>
    <!-- eyes -->
    <circle cx="${w*0.42}" cy="${h*0.18}" r="${w*0.05}" fill="white"/>
    <circle cx="${w*0.58}" cy="${h*0.18}" r="${w*0.05}" fill="white"/>
    <circle cx="${w*0.43}" cy="${h*0.18}" r="${w*0.028}" fill="#111"/>
    <circle cx="${w*0.59}" cy="${h*0.18}" r="${w*0.028}" fill="#111"/>
    <!-- beak -->
    <ellipse cx="${w*0.5}" cy="${h*0.25}" rx="${w*0.07}" ry="${h*0.04}" fill="#f5a030"/>
    <!-- wings -->
    <ellipse cx="${w*0.18}" cy="${h*0.55}" rx="${w*0.13}" ry="${h*0.22}" fill="#111228" transform="rotate(-10,${w*0.18},${h*0.55})"/>
    <ellipse cx="${w*0.82}" cy="${h*0.55}" rx="${w*0.13}" ry="${h*0.22}" fill="#111228" transform="rotate(10,${w*0.82},${h*0.55})"/>
    <!-- feet -->
    <ellipse cx="${w*0.38}" cy="${h*0.92}" rx="${w*0.14}" ry="${h*0.05}" fill="#f5a030"/>
    <ellipse cx="${w*0.62}" cy="${h*0.92}" rx="${w*0.14}" ry="${h*0.05}" fill="#f5a030"/>
    <!-- blue accent band -->
    <path d="M${w*0.15},${h*0.38} Q${w*0.08},${h*0.3} ${w*0.2},${h*0.22}" stroke="#00aaee" stroke-width="1.5" fill="none" opacity="0.5"/>
    <path d="M${w*0.85},${h*0.38} Q${w*0.92},${h*0.3} ${w*0.8},${h*0.22}" stroke="#00aaee" stroke-width="1.5" fill="none" opacity="0.5"/>
  </svg>`;
}

function makeHouse(w, h, windowW, windowH, antennaH, snowCapW) {
  const el = document.createElement('div');
  el.className = 'house';
  el.style.cssText = `bottom:0;`;
  el.innerHTML = `
    <div class="house-roof" style="border-left-width:${w*0.55}px;border-right-width:${w*0.55}px;border-bottom-width:${h*0.45}px;width:0;">
      <div style="position:absolute;top:0;left:${-w*0.55}px;width:${w*1.1}px;height:8px;background:#d8eef8;border-radius:2px 2px 0 0;margin-top:${h*0.45-6}px;"></div>
    </div>
    <div class="house-body" style="width:${w}px;height:${h*0.6}px;">
      <div class="house-antenna" style="height:${antennaH}px;"></div>
      <div class="house-window" style="width:${windowW}px;height:${windowH}px;"></div>
    </div>
  `;
  return el;
}

function makeTree(size) {
  const el = document.createElement('div');
  el.className = 'tree';
  const s = size;
  el.innerHTML = `
    <div class="tree-tier" style="border-left-width:${s*0.7}px;border-right-width:${s*0.7}px;border-bottom-width:${s*0.8}px;"></div>
    <div class="tree-tier" style="border-left-width:${s*0.9}px;border-right-width:${s*0.9}px;border-bottom-width:${s}px;margin-top:-${s*0.3}px;"></div>
    <div class="tree-tier" style="border-left-width:${s*1.1}px;border-right-width:${s*1.1}px;border-bottom-width:${s*1.1}px;margin-top:-${s*0.35}px;"></div>
    <div class="tree-trunk" style="height:${s*0.4}px;"></div>
  `;
  return el;
}

function buildVillage() {
  const village = document.getElementById('village');
  village.innerHTML = '';
  const W = village.offsetWidth || window.innerWidth - 280;

  // Layout: [tree, house, penguin, tree, penguin, tree, house, tree, house, tree, penguin, house]
  const layout = [
    { type:'tree', x: W*0.02, size:18 },
    { type:'house', x: W*0.07, w:55, h:70, ww:20, wh:15, ant:28 },
    { type:'penguin', x: W*0.17, size:52, hat:false, dir:'right' },
    { type:'tree', x: W*0.24, size:16 },
    { type:'tree', x: W*0.28, size:22 },
    { type:'house', x: W*0.33, w:44, h:55, ww:16, wh:12, ant:22 },
    { type:'penguin', x: W*0.42, size:58, hat:true, glow:'#f5c842', dir:'left' },
    { type:'tree', x: W*0.49, size:14 },
    { type:'penguin', x: W*0.54, size:46, hat:false, dir:'right' },
    { type:'tree', x: W*0.60, size:20 },
    { type:'house', x: W*0.64, w:58, h:72, ww:22, wh:16, ant:30 },
    { type:'tree', x: W*0.73, size:16 },
    { type:'tree', x: W*0.77, size:18 },
    { type:'penguin', x: W*0.82, size:50, hat:true, glow:'#2dcea0', dir:'left' },
    { type:'house', x: W*0.87, w:50, h:65, ww:18, wh:14, ant:25 },
    { type:'tree', x: W*0.95, size:15 },
  ];

  layout.forEach(item => {
    let el;
    if (item.type === 'tree') {
      el = makeTree(item.size);
      el.style.left = item.x + 'px';
    } else if (item.type === 'house') {
      el = makeHouse(item.w, item.h, item.ww, item.wh, item.ant);
      el.style.left = item.x + 'px';
    } else if (item.type === 'penguin') {
      el = document.createElement('div');
      el.className = 'penguin';
      el.style.left = item.x + 'px';
      el.innerHTML = `<div class="penguin-inner">${makePenguinSVG(item.size, item.hat, item.glow)}</div>`;
      animatePenguin(el, item.x, W, item.dir, item.size);
    }
    village.appendChild(el);
  });
}

function animatePenguin(el, startX, maxW, initDir, size) {
  let x = startX;
  let dir = initDir === 'left' ? -1 : 1;
  let speed = 0.4 + Math.random() * 0.5;
  let waddleAngle = 0;
  let waddleDir = 1;
  let paused = false;
  let pauseTimer = 0;

  const inner = el.querySelector('.penguin-inner');

  function tick() {
    if (paused) {
      pauseTimer--;
      if (pauseTimer <= 0) paused = false;
    } else {
      x += dir * speed;
      waddleAngle += waddleDir * 1.5;
      if (Math.abs(waddleAngle) > 7) waddleDir *= -1;

      // Boundary bounce
      if (x < 10) { x = 10; dir = 1; }
      if (x > maxW - size) { x = maxW - size; dir = -1; }

      // Random pause
      if (Math.random() < 0.003) {
        paused = true;
        pauseTimer = 40 + Math.random() * 80;
        waddleAngle = 0;
      }
    }

    el.style.left = x + 'px';
    const flip = dir < 0 ? 'scaleX(-1)' : '';
    inner.style.transform = paused
      ? `${flip} rotate(0deg)`
      : `${flip} rotate(${waddleAngle}deg)`;

    requestAnimationFrame(tick);
  }
  // Stagger start
  setTimeout(tick, Math.random() * 2000);
}

// Build village after layout
setTimeout(buildVillage, 100);
window.addEventListener('resize', buildVillage);

// Open subject
function openSubject(s) {
  // Update active card
  document.querySelectorAll('.subject-card').forEach(c => c.classList.remove('active'));
  document.getElementById('card-' + s.id).classList.add('active');
  activeId = s.id;

  // Hide welcome
  document.getElementById('welcome').classList.add('hidden');

  // Fill chapter overlay
  const iconStyle = s.isText
    ? `background:${s.iconBg}; color:${s.iconColor}; font-family:monospace; font-size:22px; font-weight:700;`
    : `background:${s.iconBg}; font-size:22px;`;

  document.getElementById('ovIcon').style.cssText = iconStyle;
  document.getElementById('ovIcon').textContent = s.icon;
  document.getElementById('ovName').textContent = s.name;
  document.getElementById('ovSub').textContent = s.sub;
  document.getElementById('ovCount').textContent = s.chapters.length + ' Chapters';

  const grid = document.getElementById('chapterGrid');
  grid.innerHTML = '';
  s.chapters.forEach((ch, i) => {
    const item = document.createElement('div');
    item.className = 'chapter-item';
    item.innerHTML = `
      <span class="ch-num">CH${String(i+1).padStart(2,'0')}</span>
      <span class="ch-title">${ch}</span>
      <span class="ch-arrow">›</span>
    `;
    item.title = `Start quiz: ${s.name} – Chapter ${i+1}`;
    grid.appendChild(item);
  });

  document.getElementById('chapterOverlay').classList.add('visible');
}

// Close overlay
document.getElementById('closeBtn').addEventListener('click', () => {
  document.getElementById('chapterOverlay').classList.remove('visible');
  document.querySelectorAll('.subject-card').forEach(c => c.classList.remove('active'));
  document.getElementById('welcome').classList.remove('hidden');
  activeId = null;
});
</script>
