<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — Snow Quest Grade 7 | OMNI-GRID</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    /* ═══════════════════════════════════════════════════
       BASE
    ═══════════════════════════════════════════════════ */
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:#010915; }
    #app { width:100vw; height:100vh; position:relative; overflow:hidden; font-family:'Rajdhani',sans-serif; }

    /* ═══════════════════════════════════════════════════
       SCENE CANVASES
    ═══════════════════════════════════════════════════ */
    canvas { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; }
    #cBg      { z-index:0; }
    #cAurora  { z-index:1; }
    #cGlacier { z-index:2; }
    #cVillage { z-index:3; }
    #cIce     { z-index:4; }
    #cSnow    { z-index:5; }
    #cHud     { z-index:6; }
    #cTrail   { z-index:20; pointer-events:all; }

    /* ═══════════════════════════════════════════════════
       DASHBOARD — stops 112px from bottom for penguins
    ═══════════════════════════════════════════════════ */
    #dashboard {
      position:absolute; top:0; left:0;
      width:100%; height:calc(100% - 112px);
      z-index:8; display:flex; flex-direction:column;
      pointer-events:all; overflow:hidden;
    }

    /* ── TOP BAR ── */
    .top-bar {
      display:flex; align-items:center; justify-content:space-between;
      padding:12px 22px 10px; flex-shrink:0;
      background:rgba(1,9,22,.55);
      backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
      border-bottom:1px solid rgba(0,180,255,.1);
    }
    .back-btn {
      text-decoration:none; color:rgba(0,200,255,.82);
      font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:2px;
      border:1px solid rgba(0,200,255,.28); padding:7px 16px; border-radius:4px;
      background:rgba(0,20,50,.5); backdrop-filter:blur(10px);
      transition:all .25s; display:flex; align-items:center; gap:7px;
    }
    .back-btn:hover { background:rgba(0,40,80,.7); border-color:rgba(0,220,255,.55); color:#00e5ff; }
    .top-center { display:flex; flex-direction:column; align-items:center; gap:3px; }
    .dash-title {
      font-family:'Orbitron',monospace; font-size:clamp(13px,2vw,22px); font-weight:900;
      background:linear-gradient(135deg,#c0e8ff,#00e5ff,#b0f0ff);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      letter-spacing:5px; filter:drop-shadow(0 0 14px rgba(0,200,255,.5));
    }
    .dash-sub { font-family:'Share Tech Mono',monospace; font-size:8px; letter-spacing:3px; color:rgba(0,180,255,.45); }
    .dash-badges { display:flex; gap:6px; }
    .top-badge {
      background:rgba(0,220,255,.08); border:1px solid rgba(0,220,255,.28);
      color:rgba(0,220,255,.82); font-family:'Share Tech Mono',monospace;
      font-size:7px; letter-spacing:2px; padding:4px 10px; border-radius:2px;
    }

    /* ═══════════════════════════════════════════════════
       MAIN BODY = SIDEBAR + CONTENT
    ═══════════════════════════════════════════════════ */
    .main-body {
      flex:1; display:flex; overflow:hidden; min-height:0;
    }

    /* ═══════════════════════════════════════════════════
       LEFT SIDEBAR — VERTICAL NAV RAIL
    ═══════════════════════════════════════════════════ */
    .sidebar {
      width:230px; flex-shrink:0;
      display:flex; flex-direction:column;
      padding:16px 14px; gap:8px;
      background:rgba(0,10,28,.62);
      backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
      border-right:1px solid rgba(0,160,220,.12);
      overflow-y:auto; overflow-x:hidden;
    }
    .sidebar::-webkit-scrollbar { width:3px; }
    .sidebar::-webkit-scrollbar-thumb { background:rgba(0,160,255,.25); border-radius:2px; }

    .sidebar-label {
      font-family:'Share Tech Mono',monospace; font-size:7.5px; letter-spacing:3px;
      color:rgba(0,180,255,.38); padding:0 6px 4px; border-bottom:1px solid rgba(0,150,220,.1);
      flex-shrink:0;
    }

    /* WHITE PILL TABS */
    .nav-tab {
      display:flex; align-items:center; gap:11px;
      padding:13px 16px; border-radius:12px;
      cursor:pointer; user-select:none; flex-shrink:0;
      background:#ffffff;
      box-shadow:0 4px 18px rgba(0,0,0,.45), 0 1px 4px rgba(0,0,0,.3);
      transition:transform .22s cubic-bezier(.34,1.56,.64,1),
                 box-shadow .22s ease,
                 background .2s ease;
      position:relative; overflow:hidden;
    }
    .nav-tab::before {
      content:''; position:absolute; inset:0; border-radius:12px;
      background:linear-gradient(135deg,rgba(255,255,255,0) 0%,rgba(255,255,255,.18) 100%);
      pointer-events:none;
    }
    .nav-tab:hover {
      transform:scale(1.045) translateX(4px);
      box-shadow:0 8px 32px rgba(0,0,0,.55), 0 2px 8px rgba(0,0,0,.4);
    }
    .nav-tab.active {
      transform:scale(1.05) translateX(6px);
      box-shadow:0 10px 36px rgba(0,0,0,.6), 0 0 0 2px var(--tab-color);
    }

    .tab-icon {
      width:36px; height:36px; border-radius:9px; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      font-size:18px;
      box-shadow:0 2px 8px rgba(0,0,0,.25);
    }
    .tab-text { display:flex; flex-direction:column; gap:1px; min-width:0; }
    .tab-name {
      font-family:'Rajdhani',sans-serif; font-weight:700;
      font-size:14px; color:#1a237e; letter-spacing:.5px; line-height:1;
      white-space:nowrap;
    }
    .tab-hint {
      font-family:'Share Tech Mono',monospace; font-size:8px;
      color:rgba(26,35,126,.5); letter-spacing:1px; white-space:nowrap;
    }
    .tab-count {
      margin-left:auto; flex-shrink:0;
      font-family:'Share Tech Mono',monospace; font-size:9px; font-weight:700;
      width:24px; height:24px; border-radius:6px;
      display:flex; align-items:center; justify-content:center;
      color:#fff;
    }
    /* Active dot indicator */
    .nav-tab.active .tab-name { color:#0d1b8c; }
    .nav-tab .active-bar {
      position:absolute; left:0; top:50%; transform:translateY(-50%) scaleY(0);
      width:3px; height:60%; border-radius:0 3px 3px 0;
      background:var(--tab-color); transition:transform .3s cubic-bezier(.34,1.56,.64,1);
    }
    .nav-tab.active .active-bar { transform:translateY(-50%) scaleY(1); }

    /* Progress micro-bar under tab */
    .tab-prog {
      position:absolute; bottom:0; left:14px; right:14px; height:2px;
      background:rgba(26,35,126,.1); border-radius:1px; overflow:hidden;
    }
    .tab-prog-fill {
      height:100%; border-radius:1px;
      background:var(--tab-color); opacity:.6;
      transition:width .6s ease;
    }

    /* ═══════════════════════════════════════════════════
       RIGHT CONTENT AREA
    ═══════════════════════════════════════════════════ */
    .content-area {
      flex:1; display:flex; flex-direction:column; overflow:hidden; min-height:0;
      background:rgba(0,10,32,.72);
      backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
    }

    /* ── CONTENT HEADER ── */
    .content-header {
      display:flex; align-items:center; gap:14px;
      padding:14px 22px 12px;
      border-bottom:1px solid rgba(0,150,200,.15); flex-shrink:0;
      background:rgba(0,8,28,.4);
    }
    .content-icon {
      width:46px; height:46px; border-radius:12px; flex-shrink:0;
      display:flex; align-items:center; justify-content:center; font-size:22px;
      border:1px solid rgba(0,200,255,.2);
      box-shadow:0 0 20px rgba(0,0,0,.4);
    }
    .content-meta { flex:1; min-width:0; }
    .content-name {
      font-family:'Orbitron',monospace; font-size:clamp(11px,1.6vw,16px);
      font-weight:700; letter-spacing:3px; line-height:1;
    }
    .content-desc { font-size:11px; letter-spacing:1px; color:rgba(120,185,215,.58); margin-top:4px; }
    .content-progress { text-align:right; flex-shrink:0; }
    .progress-label { font-family:'Share Tech Mono',monospace; font-size:9px; color:rgba(0,190,255,.6); letter-spacing:1px; }
    .progress-bar-wrap { width:120px; height:4px; background:rgba(0,80,130,.3); border-radius:2px; overflow:hidden; margin-top:5px; }
    .progress-bar { height:100%; border-radius:2px; transition:width .5s ease; }

    /* ── CHAPTER GRID SCROLL ── */
    .chapter-scroll { flex:1; overflow-y:auto; padding:16px 20px 12px; min-height:0; }
    .chapter-scroll::-webkit-scrollbar { width:4px; }
    .chapter-scroll::-webkit-scrollbar-track { background:rgba(0,12,36,.4); }
    .chapter-scroll::-webkit-scrollbar-thumb { background:rgba(0,160,255,.3); border-radius:2px; }

    /* PANE TRANSITIONS */
    .subject-pane {
      display:none; flex-direction:column; width:100%; height:100%;
      opacity:0; transform:translateY(10px);
      transition:opacity .3s ease, transform .3s ease;
      overflow:hidden;
    }
    .subject-pane.entering {
      display:flex;
      animation:paneIn .32s cubic-bezier(.25,.46,.45,.94) forwards;
    }
    @keyframes paneIn {
      from { opacity:0; transform:translateX(18px); }
      to   { opacity:1; transform:translateX(0); }
    }
    .subject-pane.active { display:flex; opacity:1; transform:none; }

    /* CHAPTER CARDS GRID */
    .chapter-grid {
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(200px,1fr));
      gap:10px;
    }
    .chapter-card {
      background:rgba(0,20,55,.68); border:1px solid rgba(0,140,190,.18);
      border-radius:8px; padding:13px 14px;
      cursor:pointer; transition:all .22s ease;
      position:relative; overflow:hidden;
    }
    .chapter-card::before {
      content:''; position:absolute; top:0; left:0;
      width:3px; height:100%; border-radius:2px 0 0 2px;
      background:var(--accent); opacity:.9;
    }
    .chapter-card:hover {
      border-color:rgba(0,190,255,.4);
      background:rgba(0,30,75,.78);
      transform:translateY(-3px);
      box-shadow:0 8px 28px rgba(0,0,0,.4), 0 0 0 1px rgba(0,190,255,.12);
    }
    .chapter-card:hover .ch-glow { opacity:1; }
    .ch-glow {
      position:absolute; top:-20px; right:-20px;
      width:80px; height:80px; border-radius:50%;
      background:radial-gradient(circle, var(--accent) 0%, transparent 70%);
      opacity:0; pointer-events:none; transition:opacity .3s;
    }
    .ch-number { font-family:'Share Tech Mono',monospace; font-size:8px; letter-spacing:2px; margin-bottom:5px; color:var(--accent); opacity:.72; }
    .ch-title { font-family:'Rajdhani',sans-serif; font-weight:600; font-size:13px; color:rgba(195,232,255,.92); margin-bottom:8px; line-height:1.35; }
    .ch-footer { display:flex; align-items:center; justify-content:space-between; }
    .ch-topics { font-size:9px; color:rgba(100,160,200,.55); }
    .test-badge {
      font-family:'Share Tech Mono',monospace; font-size:7px; letter-spacing:1px;
      padding:3px 7px; border-radius:3px;
      background:rgba(0,200,120,.12); border:1px solid rgba(0,200,120,.35); color:#00e87a;
    }
    .test-badge.locked {
      background:rgba(60,70,110,.15); border-color:rgba(60,70,110,.3); color:rgba(120,145,190,.4);
    }

    /* ── BOTTOM STRIP LABEL ── */
    .strip-label {
      position:absolute; bottom:5px; right:22px; z-index:7;
      font-family:'Share Tech Mono',monospace; font-size:7px;
      letter-spacing:2px; color:rgba(0,180,255,.2); pointer-events:none;
    }
  </style>
</head>

      <!-- ══ RIGHT CONTENT AREA ══ -->

/* ══════════════════════════════════════════════════════
   RENDER ENGINE
══════════════════════════════════════════════════════ */
let currentSubject = 'science';
let switchTimer = null;

const header = document.getElementById('contentHeader');
const scroll  = document.getElementById('chapterScroll');

function renderHeader(key) {
  const s = SUBJECTS[key];
  const done = s.chapters.filter(c => c.done).length;
  header.innerHTML = `
    <div class="content-icon" style="background:${s.iconBg}; border-color:${s.color}33;">${s.icon}</div>
    <div class="content-meta">
      <div class="content-name" style="color:${s.color};">${s.fullName}</div>
      <div class="content-desc">${s.desc}</div>
    </div>
    <div class="content-progress">
      <div class="progress-label">${done}/${s.chapters.length} DONE · ${s.progress}%</div>
      <div class="progress-bar-wrap">
        <div class="progress-bar" style="width:${s.progress}%;background:linear-gradient(90deg,${s.color}88,${s.color});"></div>
      </div>
    </div>`;
}

function renderGrid(key) {
  const s = SUBJECTS[key];

  // Fade out current
  const old = scroll.querySelector('.chapter-grid');
  if (old) {
    old.style.transition = 'opacity .18s ease, transform .18s ease';
    old.style.opacity = '0';
    old.style.transform = 'translateX(-10px)';
  }

  setTimeout(() => {
    scroll.innerHTML = '';
    const grid = document.createElement('div');
    grid.className = 'chapter-grid';
    grid.style.cssText = 'opacity:0;transform:translateX(14px);transition:opacity .28s ease,transform .28s ease;';

    s.chapters.forEach((ch, idx) => {
      const card = document.createElement('div');
      card.className = 'chapter-card';
      card.style.setProperty('--accent', s.color);
      card.innerHTML = `
        <div class="ch-glow" style="background:radial-gradient(circle,${s.color}55 0%,transparent 70%);"></div>
        <div class="ch-number" style="color:${s.color};">CH ${String(idx+1).padStart(2,'0')}</div>
        <div class="ch-title">${ch.title}</div>
        <div class="ch-footer">
          <div class="ch-topics">${ch.topics}</div>
          <div class="test-badge ${ch.done?'':'locked'}">${ch.done?'&#10003; TEST ZONE':'LOCKED'}</div>
        </div>`;
      card.addEventListener('click', () => {
        card.style.boxShadow = `0 0 26px ${s.color}66`;
        setTimeout(() => card.style.boxShadow = '', 700);
      });
      grid.appendChild(card);
    });

    scroll.appendChild(grid);
    scroll.scrollTop = 0;

    // Trigger entrance animation
    requestAnimationFrame(() => {
      grid.style.opacity = '1';
      grid.style.transform = 'translateX(0)';
    });
  }, old ? 160 : 0);
}

function switchSubject(key, immediate) {
  if (key === currentSubject && !immediate) return;
  currentSubject = key;

  // Update header instantly
  renderHeader(key);

  // Update sidebar tabs
  document.querySelectorAll('.nav-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.subject === key);
  });

  // Render grid with transition
  renderGrid(key);
}

/* ══════════════════════════════════════════════════════
   SIDEBAR HOVER + CLICK LOGIC
══════════════════════════════════════════════════════ */
document.querySelectorAll('.nav-tab').forEach(tab => {
  // Hover — switch with tiny debounce so fast mouse-overs don't flash
  tab.addEventListener('mouseenter', () => {
    clearTimeout(switchTimer);
    switchTimer = setTimeout(() => switchSubject(tab.dataset.subject), 80);
  });
  tab.addEventListener('mouseleave', () => clearTimeout(switchTimer));

  // Click also switches (and locks selection on mobile)
  tab.addEventListener('click', () => switchSubject(tab.dataset.subject));
});

/* ══════════════════════════════════════════════════════
   BOOT
══════════════════════════════════════════════════════ */
switchSubject('science', true);
SnowQuestScene.init('app');
PenguinEngine.init('cTrail', 'app', SnowQuestScene.GROUND_Y);

setTimeout(() => {
  document.querySelectorAll('#app > div[style*="cursor:pointer"]').forEach(d => d.style.zIndex = '21');
}, 200);
</script>
