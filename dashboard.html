<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNI-GRID | Expedition Hub Class 7</title>
    <style>
        :root {
            --bg-space: #020b18;
            --neon-blue: #00d4ff;
            --neon-yellow: #fbff00;
            --tab-white: #ffffff;
            --text-dark: #0a1931;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: radial-gradient(circle at center, #101d35 0%, var(--bg-space) 100%);
            color: #fff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- THEME OVERLAY (Stars & Tech Lines) --- */
        .overlay {
            position: absolute;
            width: 100%; height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.3;
            pointer-events: none;
        }

        /* --- SIDEBAR NAVIGATION --- */
        #sidebar {
            width: 320px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-right: 1px solid rgba(0, 212, 255, 0.2);
            padding: 50px 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 10;
        }

        .subject-tab {
            position: relative;
            background: var(--tab-white);
            color: var(--text-dark);
            padding: 20px;
            border-radius: 15px;
            font-weight: 900;
            font-size: 14px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid transparent;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* YELLOW STREAK ANIMATION */
        .subject-tab::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 4px;
            background: var(--neon-yellow);
            transition: 0.4s;
        }

        .subject-tab:hover {
            transform: translateX(15px);
            box-shadow: 0 0 30px rgba(251, 255, 0, 0.4);
            border-color: var(--neon-yellow);
        }

        .subject-tab:hover::after {
            left: 100%;
        }

        /* --- MAIN STAGE --- */
        #main-stage {
            flex-grow: 1;
            padding: 60px;
            position: relative;
            z-index: 5;
            display: flex;
            flex-direction: column;
        }

        header h1 {
            font-size: 3.5rem;
            letter-spacing: -2px;
            margin-bottom: 40px;
            background: linear-gradient(to bottom, #fff, var(--neon-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #index-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            overflow-y: auto;
            padding-bottom: 100px;
        }

        .chapter-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 212, 255, 0.1);
            padding: 25px;
            border-radius: 20px;
            transition: 0.3s;
            animation: fadeIn 0.5s ease forwards;
        }

        .chapter-card:hover {
            background: rgba(0, 212, 255, 0.05);
            border-color: var(--neon-blue);
            transform: translateY(-5px);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- PENGUIN SNOW-QUEST FOOTER --- */
        .snow-ground {
            position: absolute;
            bottom: 0; left: 320px;
            width: calc(100% - 320px);
            height: 120px;
            background: linear-gradient(to top, #ffffff1a, transparent);
            pointer-events: none;
        }

        .penguin-slider {
            position: absolute;
            bottom: 20px;
            width: 80px;
            height: 80px;
            background: url('https://img.icons8.com/color/96/penguin.png') no-repeat center;
            background-size: contain;
            animation: slideLeft 15s linear infinite;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));
        }

        @keyframes slideLeft {
            from { right: -100px; transform: rotate(-5deg); }
            to { right: 110%; transform: rotate(5deg); }
        }

    </style>
</head>
<body>

    <div class="overlay"></div>

    <nav id="sidebar">
        <div class="subject-tab" onmouseover="updateIndex('SCIENCE')">Science (Curiosity)</div>
        <div class="subject-tab" onmouseover="updateIndex('MATHS')">Mathematics</div>
        <div class="subject-tab" onmouseover="updateIndex('SST')">Exploring Society</div>
        <div class="subject-tab" onmouseover="updateIndex('ENGLISH')">English (Poorvi)</div>
        <div class="subject-tab" onmouseover="updateIndex('HINDI')">Hindi (Vasant)</div>
    </nav>

    <main id="main-stage">
        <header>
            <h1 id="subject-title">OMNI-GRID HUB</h1>
        </header>
        <div id="index-grid">
            </div>

        <div class="snow-ground">
            <div class="penguin-slider" style="animation-duration: 12s; bottom: 10px;"></div>
            <div class="penguin-slider" style="animation-duration: 18s; bottom: 40px; animation-delay: 5s;"></div>
        </div>
    </main>

    <script>
        const curriculum = {
            "SCIENCE": [
                { id: "01", name: "The Ever-Evolving World of Science" },
                { id: "02", name: "Exploring Substances: Acid/Base" },
                { id: "03", name: "Electricity and Circuits" },
                { id: "04", name: "Metals & Non-metals" },
                { id: "05", name: "Changes Around Us" },
                { id: "06", name: "Adolescence: Growth and Change" }
            ],
            "MATHS": [
                { id: "01", name: "Integers" },
                { id: "02", name: "Fractions and Decimals" },
                { id: "03", name: "Data Handling" },
                { id: "04", name: "Simple Equations" },
                { id: "05", name: "Lines and Angles" },
                { id: "06", name: "Triangle Properties" },
                { id: "07", name: "Comparing Quantities" },
                { id: "08", name: "Rational Numbers" }
            ],
            "SST": [
                { id: "01", name: "Geographical Diversity of India" },
                { id: "02", name: "Understanding the Weather" },
                { id: "10", name: "Indian Constitution: Introduction" },
                { id: "04", name: "Making of New States" },
                { id: "05", name: "Rulers & Buildings" }
            ],
            "ENGLISH": [
                { id: "01", name: "Learning Together" },
                { id: "02", name: "Wit and Humour" },
                { id: "03", name: "Dreams and Discoveries" },
                { id: "04", name: "Health and Wellness" }
            ],
            "HINDI": [
                { id: "01", name: "Ham Panchi Unmukt Gagan Ke" },
                { id: "02", name: "Himalay ki Betiyan" },
                { id: "03", name: "Kathputli" }
            ]
        };

        function updateIndex(subject) {
            const grid = document.getElementById('index-grid');
            const title = document.getElementById('subject-title');
            
            title.innerText = subject + " INDEX";
            grid.innerHTML = ""; // Clear current

            curriculum[subject].forEach(ch => {
                const card = document.createElement('div');
                card.className = 'chapter-card';
                card.innerHTML = `
                    <div style="color:var(--neon-blue); font-weight:bold; font-size:12px; margin-bottom:5px;">MISSION ${ch.id}</div>
                    <div style="font-size:18px; font-weight:600;">${ch.name}</div>
                `;
                grid.appendChild(card);
            });
        }
    </script>
</body>
</html>
