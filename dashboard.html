<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNI-GRID | Expedition Hub</title>
    <style>
        :root {
            --bg-space: #020b18;
            --neon-blue: #00d4ff;
            --neon-yellow: #fbff00;
            --tab-white: #ffffff;
            --text-dark: #0a1931;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: radial-gradient(circle at center, #101d35 0%, var(--bg-space) 100%);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .overlay {
            position: absolute;
            width: 100%; height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.3;
            pointer-events: none;
        }

        /* --- SIDEBAR --- */
        #sidebar {
            width: 320px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(0, 212, 255, 0.2);
            padding: 50px 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 10;
        }

        .subject-tab {
            position: relative;
            background: var(--tab-white);
            color: var(--text-dark);
            padding: 18px 25px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 13px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid transparent;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .subject-tab:hover {
            transform: translateX(10px);
            background: #f0f0f0;
        }

        .subject-tab.active {
            background: var(--neon-blue);
            color: white;
            transform: translateX(15px);
            border-color: var(--neon-yellow);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
        }

        /* --- MAIN STAGE --- */
        #main-stage {
            flex-grow: 1;
            padding: 60px;
            position: relative;
            z-index: 5;
            display: flex;
            flex-direction: column;
        }

        header h1 {
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 40px;
            background: linear-gradient(to bottom, #fff, var(--neon-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #index-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            overflow-y: auto;
            padding-bottom: 150px;
        }

        .chapter-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 212, 255, 0.1);
            padding: 25px;
            border-radius: 20px;
            opacity: 0;
            transform: translateY(20px);
            animation: cardEnter 0.5s ease forwards;
            transition: 0.3s;
            cursor: pointer;
        }

        .chapter-card:hover {
            background: rgba(0, 212, 255, 0.08);
            border-color: var(--neon-blue);
            transform: scale(1.03);
        }

        @keyframes cardEnter {
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- SPACE PENGUIN SECTION --- */
        .snow-ground {
            position: absolute;
            bottom: 0; left: 320px;
            width: calc(100% - 320px);
            height: 100px;
            background: linear-gradient(to top, rgba(255,255,255,0.1), transparent);
            pointer-events: none;
        }

        .penguin-container {
            position: absolute;
            bottom: 20px;
            width: 80px;
            height: 80px;
            animation: slideLeft 15s linear infinite;
        }

        .penguin {
            width: 100%;
            height: 100%;
            background: url('https://img.icons8.com/color/96/penguin.png') no-repeat center;
            background-size: contain;
            position: relative;
        }

        /* THE NEON HELMET */
        .helmet {
            position: absolute;
            top: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 55px;
            height: 50px;
            border-radius: 50% 50% 40% 40%;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(2px);
            z-index: 2;
        }

        /* THE VISOR */
        .helmet::after {
            content: '';
            position: absolute;
            top: 15px;
            left: 10%;
            width: 80%;
            height: 15px;
            background: rgba(0, 212, 255, 0.6);
            border-radius: 5px;
            box-shadow: 0 0 10px var(--neon-blue);
        }

        @keyframes slideLeft {
            from { right: -100px; }
            to { right: 110%; }
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <nav id="sidebar">
        <div class="subject-tab" onclick="updateUI('SCIENCE', this)">Science (Curiosity)</div>
        <div class="subject-tab" onclick="updateUI('MATHS', this)">Mathematics</div>
        <div class="subject-tab" onclick="updateUI('SST', this)">Exploring Society</div>
        <div class="subject-tab" onclick="updateUI('ENGLISH', this)">English (Poorvi)</div>
        <div class="subject-tab" onclick="updateUI('HINDI', this)">Hindi (Vasant)</div>
    </nav>

    <main id="main-stage">
        <header>
            <h1 id="subject-title">HUB INITIALIZING...</h1>
        </header>
        <div id="index-grid"></div>

        <div class="snow-ground">
            <div class="penguin-container" style="animation-duration: 12s; bottom: 10px;">
                <div class="helmet"></div>
                <div class="penguin"></div>
            </div>
            <div class="penguin-container" style="animation-duration: 18s; bottom: 35px; animation-delay: 5s;">
                <div class="helmet" style="border-color: var(--neon-yellow);"></div>
                <div class="penguin"></div>
            </div>
        </div>
    </main>

    <script>
        const curriculum = {
            "SCIENCE": [
                { id: "01", name: "The Ever-Evolving World of Science" },
                { id: "02", name: "Exploring Substances: Acid/Base" },
                { id: "03", name: "Electricity and Circuits" },
                { id: "04", name: "Metals & Non-metals" },
                { id: "05", name: "Changes Around Us" },
                { id: "06", name: "Adolescence: Growth and Change" }
            ],
            "MATHS": [
                { id: "01", name: "Integers" },
                { id: "02", name: "Fractions and Decimals" },
                { id: "03", name: "Data Handling" },
                { id: "04", name: "Simple Equations" },
                { id: "05", name: "Lines and Angles" },
                { id: "06", name: "Triangle Properties" },
                { id: "07", name: "Comparing Quantities" },
                { id: "08", name: "Rational Numbers" }
            ],
            "SST": [
                { id: "01", name: "Geographical Diversity of India" },
                { id: "02", name: "Understanding the Weather" },
                { id: "10", name: "Indian Constitution: Introduction" },
                { id: "04", name: "Making of New States" },
                { id: "05", name: "Rulers & Buildings" }
            ],
            "ENGLISH": [
                { id: "01", name: "Learning Together" },
                { id: "02", name: "Wit and Humour" },
                { id: "03", name: "Dreams and Discoveries" },
                { id: "04", name: "Health and Wellness" }
            ],
            "HINDI": [
                { id: "01", name: "Ham Panchi Unmukt Gagan Ke" },
                { id: "02", name: "Himalay ki Betiyan" },
                { id: "03", name: "Kathputli" }
            ]
        };

        function updateUI(subject, el) {
            const grid = document.getElementById('index-grid');
            const title = document.getElementById('subject-title');

            // Set active tab
            document.querySelectorAll('.subject-tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');

            // Update Title
            title.innerText = subject + " MISSIONS";
            
            // Clear and Repopulate with stagger
            grid.innerHTML = "";
            curriculum[subject].forEach((ch, index) => {
                const card = document.createElement('div');
                card.className = 'chapter-card';
                card.style.animationDelay = `${index * 0.05}s`;
                card.innerHTML = `
                    <div style="color:var(--neon-blue); font-weight:bold; font-size:11px; margin-bottom:8px; letter-spacing:1px;">SECTOR ${ch.id}</div>
                    <div style="font-size:18px; font-weight:600; color:#fff;">${ch.name}</div>
                `;
                grid.appendChild(card);
            });
        }

        // Auto-load first subject
        window.onload = () => {
            const firstTab = document.querySelector('.subject-tab');
            updateUI('SCIENCE', firstTab);
        };
    </script>
</body>
</html>
